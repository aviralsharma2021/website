server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Basic health endpoint for container platforms and probes.
    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Always revalidate CSS/JS so design tweaks show up immediately after deploy.
    location ~* \.(?:css|js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Keep media/font assets cached.
    location ~* \.(?:png|jpg|jpeg|gif|svg|ico|webp|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # HTML should refresh frequently.
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        try_files $uri $uri/ /index.html;
    }
}
