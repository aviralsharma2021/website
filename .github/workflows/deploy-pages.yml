name: Deploy CV Site to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p site
          rsync -a --delete --exclude ".git" --exclude ".github" --exclude "site" --exclude "Dockerfile" --exclude "nginx.conf" --exclude ".dockerignore" ./ site/
          rm -rf site/.git site/.github
          rm -f site/Dockerfile site/nginx.conf site/.dockerignore
          touch site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
